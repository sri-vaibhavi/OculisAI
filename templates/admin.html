<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - OCULIS AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== YOUR ORIGINAL STYLES ===== */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f7f8;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #003366; /* Dark Blue */
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header img { height: 50px; }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover { text-decoration: underline; }

        footer {
            background: #003366;
            color: white;
            text-align: center;
            padding: 20px;
        }

        footer a {
            color: white;
            margin: 0 8px;
        }

        /* ===== ADMIN FORM STYLING ===== */
        .main-content {
            flex: 1; /* Pushes footer to bottom */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .admin-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        .admin-card h2 {
            margin-top: 0;
            color: #003366;
            text-align: center;
            margin-bottom: 10px;
        }

        .admin-card p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #003366;
            box-shadow: 0 0 5px rgba(2, 0, 130, 0.2);
        }

        .submit-btn {
            width: 100%;
            background: #003366;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #003366;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="OCULIS AI Logo">
        <nav>
            <a href="/">Home</a>
            <a href="/login_page">Login</a>
            <a href="/patient">Patient Form</a>
            <a href="/chatbot">Chatbot</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="/feedback">Feedback</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="admin-card">
            <h2>Add New Doctor</h2>
            <p>Fill in the details below to create a medical admin account.</p>
            
            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="full_name">Dr. Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Dr. John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="doctor@oculisai.com" required>
                </div>

                <div class="form-group">
                    <label for="phone_number">Phone Number</label>
                    <input type="text" id="phone_number" name="phone_number" placeholder="044-XXXXXXXX">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Create Admin Account</button>
            </form>
        </div>
    </main>

    <footer>
        © 2025 OCULIS AI | Contact: 044 - 12345678 <br>
        Follow us:
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
    </footer>

</body>
</html>
